<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green MBTA App</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .search-card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid #e5e7eb;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 700;
      color: #111827;
    }

    .subtitle {
      margin: 0 0 28px 0;
      color: #6b7280;
      font-size: 1rem;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #dbe3f0;
      font-size: 1rem;
      color: #111827;
      outline: none;
      transition: 0.2s ease;
      background: #ffffff;
    }

    input::placeholder {
      color: #9ca3af;
    }

    input:focus {
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: #10b981;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
    }

    button:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    button:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .search-card {
        padding: 26px;
      }

      h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>
  <div class="search-card">
    <h1>Green MBTA</h1>
    <p class="subtitle">
      Find your nearest MBTA stop and check the air quality around your destination.
    </p>

    <form action="/submit" method="post">
      <label for="location">Enter your location</label>
      <input
        type="text"
        id="location"
        name="location"
        placeholder="e.g. Boston Common"
        required
      />

      <button type="submit">Find Nearest Stop</button>
    </form>

    <p class="hint">
      Try a place name, address, or landmark in the Boston area.
    </p>
  </div>
</body>
</html>
