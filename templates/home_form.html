<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Green MBTA App</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;

            /* Background = deep green glow */
            background: radial-gradient(circle at top left, #1f4d2b, #0b1f13 70%);
        }

        .glass-container {
            width: 380px;
            padding: 40px;

            /* Liquid glass base */
            background: rgba(120, 255, 160, 0.08);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);

            border-radius: 28px;

            /* Soft glass edge */
            border: 1px solid rgba(180, 255, 200, 0.25);

            /* Glow + depth */
            box-shadow:
                0 0 30px rgba(100, 255, 150, 0.25),
                inset 0 0 20px rgba(255, 255, 255, 0.08),
                inset 0 0 2px rgba(255,255,255,0.6);

            text-align: center;
            color: white;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 25px;

            /* subtle glow text */
            text-shadow: 0 0 10px rgba(150, 255, 180, 0.6);
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            opacity: 0.8;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 14px;
            border: none;
            outline: none;

            /* frosted input */
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);

            color: white;
            font-size: 14px;

            box-shadow:
                inset 0 0 5px rgba(255,255,255,0.1),
                0 0 10px rgba(100,255,150,0.2);
        }

        input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;

            border-radius: 16px;
            border: none;

            /* green gradient from your logo */
            background: linear-gradient(135deg, #7CFF9E, #1E7A3B);

            color: #0b1f13;
            font-weight: 600;
            cursor: pointer;

            /* glow effect */
            box-shadow:
                0 0 20px rgba(100,255,150,0.6),
                inset 0 0 10px rgba(255,255,255,0.4);

            transition: all 0.25s ease;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 0 30px rgba(120,255,170,0.9),
                inset 0 0 12px rgba(255,255,255,0.6);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="glass-container">
        <h1>Green MBTA</h1>

        <form action="/submit" method="post">
            <label for="location">Enter your location</label>
            <input type="text" id="location" name="location" placeholder="e.g. Boston Common" required>

            <button type="submit">Find Nearest Stop</button>
        </form>
    </div>
</body>
</html>
